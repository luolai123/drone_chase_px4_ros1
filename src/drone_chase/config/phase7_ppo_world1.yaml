env:
  world_type: world_1
  reset_mode: soft
  max_episode_steps: 350
  step_dt: 0.1

ppo:
  total_timesteps: 30000
  learning_rate: 0.0003
  n_steps: 512
  batch_size: 128
  n_epochs: 5
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5

save:
  output_dir: /home/whk/vf_ws/outputs/phase7/world1_sparse
  model_name: ppo_lowdim_world1
  save_freq: 10000

eval:
  eval_episodes: 5
  deterministic: true
