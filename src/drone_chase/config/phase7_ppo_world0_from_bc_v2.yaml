env:
  world_type: world_0
  reset_mode: episode_soft
  episode_soft_promote_to_soft_on_oob: false
  episode_soft_oob_margin_ratio: 0.9
  episode_soft_promote_reasons: ["out_of_bounds", "height_violation", "collision_or_too_close"]
  step_dt: 0.1
  max_episode_steps: 250
  initial_grace_steps: 20
  start_z_min: 1.0
  start_z_max: 2.0
  reset_ready_timeout: 15.0
  reset_zero_cmd_duration: 1.0
  world_x_limit: 1000.0
  world_y_limit: 1000.0
  respawn_target_on_reset: true
  target_spawn_distance_min: 3.0
  target_spawn_distance_max: 5.0
  target_spawn_lateral_min: -0.5
  target_spawn_lateral_max: 0.5
  target_spawn_z: 1.0
  capture_distance: 0.8
  success_distance: 0.8
  success_hold_steps: 3
  reward_variant: v2
  approach_weight: 5.0
  approach_delta_clip: 0.2
  distance_weight: 0.02
  visibility_reward: 0.1
  visibility_loss: 1.0
  center_weight: 0.3
  obstacle_weight: 2.0
  obstacle_close_depth: 0.5
  obstacle_close_penalty: 0.0
  smooth_weight: 0.005
  yaw_weight: 0.02
  forward_weight: 0.05
  lost_extra_weight: 0.05
  success_bonus: 50.0
  timeout_penalty: -10.0
  height_violation_penalty: -30.0
  collision_penalty: -50.0

ppo:
  total_timesteps: 10000
  learning_rate: 0.00001
  n_steps: 512
  batch_size: 128
  n_epochs: 5
  gamma: 0.98
  gae_lambda: 0.95
  clip_range: 0.05
  ent_coef: 0.0
  vf_coef: 0.5
  max_grad_norm: 0.5
  use_sde: true
  sde_sample_freq: -1
  policy_kwargs:
    net_arch:
      pi: [128, 128]
      vf: [128, 128]
    ortho_init: false
    log_std_init: -4.0
    squash_output: true

save:
  output_dir: /home/whk/vf_ws/outputs/phase7/world0_ppo_from_bc_v2_10k
  model_name: ppo_world0_from_bc_v2
  save_freq: 2500

eval:
  eval_episodes: 5
  deterministic: true
  eval_freq: 2500
